name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ['8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, mbstring, xml, bcmath, gd, zip, pcntl, exif
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm packages
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --no-coverage

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            # Pull latest compose files and nginx config
            git pull origin main

            # Pin image tag for this release
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env

            # Pull the new image
            DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }} IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.prod.yml pull app queue

            # Recreate only app and queue (mysql/redis/nginx keep running)
            DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }} IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.prod.yml up -d \
              --no-deps --force-recreate app queue

            # Wait for app entrypoint to finish copying assets and PHP-FPM to be ready
            sleep 10

            # Post-deploy tasks
            docker exec fusion_app php artisan migrate --force
            docker exec fusion_app php artisan optimize
            docker exec fusion_app php artisan view:clear
