services:

  # ─── PHP-FPM Application ────────────────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE}:${IMAGE_TAG:-latest}
    container_name: fusion_app
    restart: always
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
      - public_files:/var/www/shared_public   # entrypoint copies public/ here
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fusion_network

  # ─── Nginx Web Server ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fusion_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - public_files:/var/www/html/public:ro          # populated by app entrypoint
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - fusion_network

  # ─── MySQL 8 Database ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: fusion_mysql
    restart: always
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fusion_network

  # ─── Redis Cache / Queue ────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: fusion_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - fusion_network

  # ─── Queue Worker ───────────────────────────────────────────────────────────
  queue:
    image: ${DOCKER_IMAGE}:${IMAGE_TAG:-latest}
    container_name: fusion_queue
    restart: always
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - fusion_network

volumes:
  public_files:
  app_storage:
  app_bootstrap:
  mysql_data:
  redis_data:

networks:
  fusion_network:
    driver: bridge
