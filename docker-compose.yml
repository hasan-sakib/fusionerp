version: '3.9'

services:
  # ─── PHP-FPM Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fusion_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - PHP_OPCACHE_ENABLE=0  # disable opcache in dev for live reload
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fusion_network

  # ─── Nginx Web Server ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fusion_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fusion_network

  # ─── MySQL 8 Database ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: fusion_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-fusion_erp}
      MYSQL_USER: ${DB_USERNAME:-fusion}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fusion_network

  # ─── Redis Cache / Queue ─────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: fusion_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fusion_network

  # ─── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fusion_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    depends_on:
      - app
      - redis
    networks:
      - fusion_network

  # ─── Vite Dev Server (development only) ─────────────────────────────────────
  vite:
    image: node:22-alpine
    container_name: fusion_vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
    networks:
      - fusion_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  fusion_network:
    driver: bridge
